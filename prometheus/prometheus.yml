global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['10.72.100.22:9090']

  - job_name: 'mikrotik_snmp'
    scrape_interval: 1m
    scrape_timeout: 30s
    static_configs:
      - targets:
          - 10.72.200.1
          - 10.72.200.2
          - 10.72.200.10
          - 10.72.200.11
          - 10.72.200.22
    metrics_path: /snmp
    params:
      auth: [intermax]
      module: [mikrotik]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp-exporter:9116
    metric_relabel_configs:
      # Replace U+FFFD in ifName (10x for up to 10 occurrences per name)
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      - source_labels: [ifName]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifName
        replacement: '${1}?${2}'
      # If ifName has corrupted chars (?) and a comment exists, use the comment as ifName
      - source_labels: [ifName, ifAlias]
        separator: ';'
        regex: '.*\?.*;(.+)'
        target_label: ifName
        replacement: '${1}'
      # Replace U+FFFD in ifDescr (10x)
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
      - source_labels: [ifDescr]
        regex: '(.*)\x{fffd}(.*)'
        target_label: ifDescr
        replacement: '${1}?${2}'
