global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['10.72.100.22:9090']

  - job_name: 'mikrotik'
    scrape_interval: 5m
    scrape_timeout: 240s
    static_configs:
      - targets: ['10.72.100.1', '10.72.100.2']
    metrics_path: /snmp
    params:
      module: [mikrotik]
      auth: [public_v2]

  - job_name: 'mikrotik_status'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['10.72.100.1', '10.72.100.2']
    metrics_path: /snmp
    params:
      module: [mikrotik_basic]
      auth: [public_v2]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 10.72.100.22:9116
