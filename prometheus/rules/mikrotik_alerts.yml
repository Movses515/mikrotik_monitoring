groups:
  - name: mikrotik_device_alerts
    rules:
      - alert: MikroTikDeviceDown
        expr: up{job="mikrotik_snmp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          description: "MikroTik device {{ $labels.instance }} is unreachable via SNMP for more than 2 minutes."

      - alert: MikroTikRouterUnreachable
        expr: absent_over_time(sysUpTime{job="mikrotik_snmp", instance=~".+"}[3m])
        for: 1m
        labels:
          severity: critical
        annotations:
          description: "Router {{ $labels.instance }} has not reported metrics for 3+ minutes."

  - name: mikrotik_interface_alerts
    rules:
      - alert: InterfaceDown
        expr: ifOperStatus{job="mikrotik_snmp", ifDescr!~".*loopback.*"} != 1 and ifAdminStatus == 1 and max_over_time(ifOperStatus{ifDescr!~".*loopback.*"}[10m]) == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} is DOWN."

      - alert: InterfaceHighErrorRate
        expr: rate(ifInErrors{job="mikrotik_snmp"}[5m]) + rate(ifOutErrors[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} has high error rate ({{ $value | printf \"%.1f\" }} errors/sec)."

  - name: mikrotik_traffic_alerts
    rules:
      - alert: NoTrafficOnInterface
        expr: rate(ifHCInOctets{job="mikrotik_snmp", ifDescr=~"ether1.*|sfp.*|bonding.*"}[5m]) == 0 and ifOperStatus == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "Interface {{ $labels.ifDescr }} on {{ $labels.instance }} is UP but has zero incoming traffic for 5+ minutes."

  - name: mikrotik_system_alerts
    rules:
      - alert: HighCPULoad
        expr: avg without(hrDeviceIndex) (hrProcessorLoad{job="mikrotik_snmp"}) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "CPU load on {{ $labels.instance }} is {{ $value }}% for 5+ minutes."

      - alert: HighMemoryUsage
        expr: (1 - hrStorageFree{hrStorageDescr="main memory"} / hrStorageSize{hrStorageDescr="main memory"}) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "Memory usage on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}%."

      - alert: HighTemperature
        expr: mtxrHlProcessorTemperature{job="mikrotik_snmp"} / 10 > 85 or mtxrHlTemperature{job="mikrotik_snmp"} / 10 > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          description: "CPU temperature on {{ $labels.instance }} is {{ $value | printf \"%.0f\" }}°C."

